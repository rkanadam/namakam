<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Namakam</title>
  <script>
    // Redirect all 404s to index.html for Angular routing
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace(
      window.location.origin + '/namakam/?p=' +
      encodeURIComponent(path.replace('/namakam/', '/') + search + hash)
    );
  </script>
</head>
<body></body>
</html>
