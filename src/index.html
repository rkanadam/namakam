<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Namakam</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <script>
    // Handle GitHub Pages 404 redirect
    (function() {
      var q = new URLSearchParams(window.location.search);
      var p = q.get('p');
      if (p) {
        q.delete('p');
        var rest = q.toString();
        window.history.replaceState(null, '', p + (rest ? '?' + rest : ''));
      }
    })();
  </script>
  <app-root></app-root>
</body>
</html>
